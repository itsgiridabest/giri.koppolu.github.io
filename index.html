<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giri — Cybersecurity & Dev</title>
    <meta name="description" content="Giri's portfolio. Exploring cybersecurity, full-stack dev, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #f7f6f2;
            --surface: #ffffff;
            --text: #111110;
            --muted: #7a7a72;
            --accent: #1a3a2a;
            --accent-light: #e8f0eb;
            --border: #e2e0d8;
            --tag-bg: #efefeb;
            --nav-h: 64px;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            line-height: 1.6;
            font-size: 16px;
        }
        /* Styling additional updates in correct syntax */
    </style>
</head>
<body>
    <!-- NAV -->
    <nav aria-label="Main Navigation">
        <span class="nav-logo" onclick="navigate('home')">Giri.</span>
        <ul class="nav-links" role="menubar">
            <li><a onclick="navigate('about')" id="nav-about" aria-current="page">About</a></li>
            <li><a onclick="navigate('projects')" id="nav-projects">Projects</a></li>
            <li><a onclick="navigate('experiences')" id="nav-experiences">Experience</a></li>
            <li><a onclick="navigate('skills')" id="nav-skills">Skills</a></li>
            <li><a onclick="navigate('contact')" id="nav-contact">Contact</a></li>
        </ul>
        <button class="hamburger" id="hamburger" onclick="toggleMenu();" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </nav>
    
    <!-- MOBILE MENU -->

    <div id="mobile-menu">
        <a onclick="navigate('about')">About</a>
    </div>
</body></html>
